name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync
      - run: uv run pytest -v

  frontend-unit:
    name: Frontend Unit (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps and Playwright browsers
        working-directory: frontend
        run: |
          npm ci
          npx playwright install chromium --with-deps

      - name: Start app
        run: |
          echo "OPENROUTER_API_KEY=dummy-key-for-ci" > .env
          echo "SECRET_KEY=ci-secret-key" >> .env
          docker compose up --build -d

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8000/api/health && echo " ready" && break
            echo "Waiting... ($i/60)"
            sleep 2
          done

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:8000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - run: docker build -t prelegal:ci .
